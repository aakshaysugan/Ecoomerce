<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #555;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .product {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .product img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        button {
            background: green;
            color: white;
            border: none;
            padding: 10px;
            margin-top: 10px;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>My E-Commerce Store</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Cart (<span id="cart-count">0</span>)</a>
</nav>

<div class="container">

    <div class="product">
        <img src="https://via.placeholder.com/250" alt="Product">
        <h3>Product 1</h3>
        <p>₹500</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/250" alt="Product">
        <h3>Product 2</h3>
        <p>₹800</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/250" alt="Product">
        <h3>Product 3</h3>
        <p>₹1200</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

</div>

<footer>
    <p>© 2026 My E-Commerce Website</p>
</footer>

<script>
    let cartCount = 0;

    function addToCart() {
        cartCount++;
        document.getElementById("cart-count").innerText = cartCount;
        alert("Item added to cart!");
    }
</script>

</body>
</html>
